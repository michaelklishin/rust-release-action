# Publish a library crate to crates.io using Trusted Publishing
#
# For library-only crates that don't produce binaries.
# Uses OIDC-based Trusted Publishing (no stored API tokens).
#
# Prerequisites:
#   1. Create a GitHub Actions environment named "release" (Settings > Environments)
#   2. Register a Trusted Publisher on crates.io (crate settings > Trusted Publishing)
#      - GitHub owner, repo name, workflow filename ("release.yml"), environment ("release")
#   3. Set NEXT_RELEASE_VERSION repository variable (Settings > Variables > Actions)
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read
  id-token: write    # Required for crates.io Trusted Publishing OIDC token exchange

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    environment: release
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - uses: michaelklishin/rust-build-package-release-action@v1
        with:
          command: validate-version
          validate-cargo-toml: 'true'

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - uses: michaelklishin/rust-build-package-release-action@v1
        with:
          command: publish-crate
          locked: 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
